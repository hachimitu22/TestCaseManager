<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestCaseManager</title>
    <script type="module" src="/main.ts"></script>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div>
          <h1>TestCaseManager</h1>
          <p>testsuite</p>
        </div>
        <button id="new-suite" type="button">New</button>
        <nav id="suite-list" class="suite-list"></nav>
      </aside>
      <section class="workspace">
        <header class="toolbar">
          <input id="suite-name" aria-label="testsuite name" />
          <button id="save-suite" type="button">Save</button>
        </header>
        <section class="creator">
          <input id="case-title" placeholder="testcase title" />
          <select id="case-format" aria-label="testcase format">
            <option value="AAA">AAA</option>
            <option value="GWT">Given-When-Then</option>
            <option value="TEXT">Text</option>
          </select>
          <div id="format-fields" class="format-fields"></div>
          <textarea id="case-notes" placeholder="notes"></textarea>
          <button id="add-case" type="button">Add testcase</button>
        </section>
        <section id="case-list" class="case-list"></section>
      </section>
    </main>
  </body>
</html>
